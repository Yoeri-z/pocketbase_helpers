name: pocketbase_helpers_cli
description: A cli for pocketbase_helpers, can automatically generate models from a pocketbase schema json.
version: 0.7.0
repository: https://github.com/Yoeri-z/pocketbase_helpers
topics:
  - pocketbase
  - models

executables:
  pb_generate:

environment:
  sdk: ^3.11.0

dependencies:
  args: ^2.7.0
  change_case: ^2.2.0
  code_builder: ^4.11.1
  dart_style: ^3.1.7
  path: ^1.9.0
  pocketbase: ^0.23.2

dev_dependencies:
  analyzer: ^10.2.0
  lints: ^6.0.0
  pocketbase_helpers: ^0.8.0
  test: ^1.25.6
